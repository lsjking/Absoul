<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>JARVIS</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ✅ 영상 -->
    <img id="video" src="http://127.0.0.1:5000/video" />

    <!-- ✅ HUD -->
    <div id="hud">
      <div class="ring big"></div>
      <div class="ring mid"></div>
      <div class="ring small"></div>

      <div class="cross"></div>
      <div class="scan-line"></div>
    </div>

    <!-- ✅ 눈 위치 점 -->
    <div id="eye"></div>

    <script src="script.js"></script>
  </body>
</html>
